<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>
<body data-protect="true">
  <header class="dashboard-header">
    <div class="logo">📒 MyApp</div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="notes.html" class="active">Notes</a>
      <a href="profile.html">Profile</a>
      <a href="#" id="logoutBtn">Logout</a>
    </nav>
  </header>

  <div class="app-layout">
    <aside class="app-sidebar">
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="notes.html" class="active">📝 Notes</a>
      <a href="profile.html">👤 Profile</a>
    </aside>
    <main class="app-content">
      <h1>📝 Your Notes</h1>

      <!-- Add / Edit form -->
      <div class="card" style="margin-bottom:2rem;">
        <form id="noteForm">
          <div class="form-group">
            <label for="noteTitle">Title</label>
            <input type="text" id="noteTitle" placeholder="Note title" required>
          </div>
          <div class="form-group">
            <label for="noteContent">Content</label>
            <textarea id="noteContent" rows="3" placeholder="Write something..." required></textarea>
          </div>
          <button type="submit" id="formSubmitBtn" class="btn btn-primary">Add Note</button>
        </form>
      </div>

      <!-- Notes list -->
      <div id="notesList"></div>
    </main>
  </div>

  <script type="module" src="../assets/js/pages/notes.js"></script>
  <script>
    // Logout (shared)
    document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
      e.preventDefault();
      import('../assets/js/auth.js').then(({ Auth }) => Auth.logout());
    });
  </script>
</body>
</html>
